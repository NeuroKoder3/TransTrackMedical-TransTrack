name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install npm dependencies
        run: npm ci

      - name: Rebuild native modules for CI Node version
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Run core tests
        run: npm test

      - name: Rebuild native modules for Node.js
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Run service tests
        run: npm run test:services

      - name: Run IPC tests
        run: npm run test:ipc

      - name: Run load tests
        run: npm run test:load

      - name: Run component tests
        run: npm run test:components

      - name: Rebuild for Electron
        run: npx @electron/rebuild -f

      - name: Build
        run: npm run build

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ xvfb

      - name: Install npm dependencies
        run: npm ci

      - name: Rebuild native modules for Node.js
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Build renderer
        run: npm run build

      - name: Install Playwright Electron dependencies
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: playwright-report
          retention-days: 30
