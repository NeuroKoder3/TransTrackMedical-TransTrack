name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Production dependency audit (fail on moderate+)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Full dependency audit (informational)
        run: npm audit || true

      - name: Check for outdated dependencies
        run: npm outdated || true

  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    # Skip when SNYK_TOKEN is not available. This transparently handles:
    #   - Dependabot PRs (do NOT receive repo Actions secrets — separate
    #     Dependabot-secret namespace; see GitHub docs).
    #   - PRs from forks (do not receive repo secrets either).
    #   - Any environment where the maintainer has not configured the
    #     Snyk integration.
    # Dependency-vulnerability coverage is still provided by the `audit`
    # job above (npm audit) and CodeQL runs in a separate workflow.
    if: ${{ github.event_name != 'schedule' && secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  snyk-skipped-notice:
    name: Snyk Vulnerability Scan (skipped — no token)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' && secrets.SNYK_TOKEN == '' }}
    steps:
      - name: Explain why Snyk was skipped
        run: |
          echo "::notice title=Snyk skipped::SNYK_TOKEN is not available in this build context."
          echo ""
          echo "This is expected for:"
          echo "  - Dependabot PRs (use Dependabot-scoped secrets if you want Snyk to run on them)."
          echo "  - PRs from forks (no access to repo secrets)."
          echo "  - Repos where SNYK_TOKEN has never been configured."
          echo ""
          echo "Dependency-vulnerability coverage on this PR is still provided by:"
          echo "  - 'Dependency Audit' job in this workflow (npm audit)."
          echo "  - 'CodeQL Analysis' workflow (separate file)."

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Run cross-org access tests
        run: npm run test:security

      - name: Run business logic tests
        run: npm run test:business

      - name: Run compliance validation tests
        run: npm run test:compliance

  load-test:
    name: Performance Load Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - run: npm install

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Run load tests
        run: npm run test:load

  lockfile-check:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify lockfile is committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::warning::package-lock.json is not committed. Dependency pinning is recommended."
          fi

      - name: Verify clean install matches lockfile
        run: npm ci --ignore-scripts

  report-audit-status:
    name: Report audit status
    runs-on: ubuntu-latest
    needs: audit
    if: always()
    steps:
      - name: Set audit commit status
        uses: actions/github-script@v9
        with:
          script: |
            const state = '${{ needs.audit.result }}' === 'success' ? 'success' : 'failure';
            const sha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'audit',
              description: `Dependency audit ${state}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
