name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Production dependency audit (fail on moderate+)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Full dependency audit (informational)
        run: npm audit || true

      - name: Check for outdated dependencies
        run: npm outdated || true

  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      # Detect whether SNYK_TOKEN is available in this run context.
      # Cases where it is NOT available (and therefore where Snyk would
      # otherwise fail with `401 Unauthorized`):
      #   - Dependabot PRs (GitHub does NOT expose regular Actions
      #     secrets to Dependabot; it has a separate "Dependabot
      #     secrets" namespace).
      #   - PRs from forks (no access to repo secrets).
      #   - Repos where SNYK_TOKEN has never been configured.
      # In all three cases, dependency-vulnerability coverage is still
      # provided by the `audit` job above (npm audit) and by the
      # CodeQL Analysis workflow (separate file).
      - name: Detect SNYK_TOKEN availability
        id: snyk_token
        env:
          SNYK_TOKEN_VALUE: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN_VALUE" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Snyk skipped::SNYK_TOKEN not available in this run context (Dependabot PR, fork PR, or repo without Snyk configured). Dependency-vulnerability coverage is still provided by the 'Dependency Audit' job (npm audit) and by the CodeQL Analysis workflow."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.snyk_token.outputs.has_token == 'true'
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.snyk_token.outputs.has_token == 'true'
        run: npm ci --ignore-scripts

      - name: Run Snyk to check for vulnerabilities
        if: steps.snyk_token.outputs.has_token == 'true'
        uses: snyk/actions/node@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Run cross-org access tests
        run: npm run test:security

      - name: Run business logic tests
        run: npm run test:business

      - name: Run compliance validation tests
        run: npm run test:compliance

  load-test:
    name: Performance Load Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - run: npm install

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3-multiple-ciphers

      - name: Run load tests
        run: npm run test:load

  lockfile-check:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify lockfile is committed
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::warning::package-lock.json is not committed. Dependency pinning is recommended."
          fi

      - name: Verify clean install matches lockfile
        run: npm ci --ignore-scripts

  report-audit-status:
    name: Report audit status
    runs-on: ubuntu-latest
    needs: audit
    if: always()
    steps:
      - name: Set audit commit status
        uses: actions/github-script@v9
        with:
          script: |
            const state = '${{ needs.audit.result }}' === 'success' ? 'success' : 'failure';
            const sha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'audit',
              description: `Dependency audit ${state}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
